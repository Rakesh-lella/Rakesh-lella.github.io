<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 480" width="1920" height="480">
  
    <defs>
      <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
        <circle cx="1.2" cy="1.2" r="1.2" fill="#cbd5e1" opacity="0.45"/>
      </pattern>
      <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#2563eb"/>
        <stop offset="100%" stop-color="#14b8a6"/>
      </linearGradient>
      <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#fafafa" stop-opacity="1"/>
        <stop offset="100%" stop-color="#fafafa" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect width="1920" height="480" fill="#fafafa"/>
    <rect width="1920" height="480" fill="url(#dots)"/>
    <rect width="1920" height="480" fill="url(#fade)"/>
    
  <!-- Right side decorative rings -->
